[tox]
envlist = py38, py39, py310, py311, py312, lint

[testenv]
deps =
    pytest>=7.0
    pytest-cov>=4.0
commands =
    pytest {posargs:tests/} -v --cov=xas_qmol_parser --cov-report=term-missing

[testenv:lint]
deps =
    flake8>=4.0
    shellcheck-py>=0.9.0
commands =
    flake8 xas_qmol_parser tests --max-line-length=120 --count --statistics
    shellcheck src/*.sh bin/*.sh

[testenv:build]
deps =
    build>=0.10.0
    twine>=4.0.0
commands =
    python -m build
    twine check dist/*

[testenv:docs]
deps =
    sphinx>=5.0
    sphinx-rtd-theme>=1.0
commands =
    sphinx-build -W -b html -d {envtmpdir}/doctrees docs docs/_build/html

[flake8]
max-line-length = 120
exclude = .git, __pycache__, build, dist, .tox, .eggs, *.egg-info
ignore = E203, W503
count = True
statistics = True
